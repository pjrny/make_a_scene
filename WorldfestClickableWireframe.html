<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldFest Awards App Wireframe</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #1d2433;
      --muted: #657089;
      --line: #dde3ef;
      --accent: #5b6cff;
      --accent-soft: #eef1ff;
      --warn: #fff4e5;
      --warn-text: #8a5a00;
      --ok: #ecfdf3;
      --ok-text: #0f6b3f;
      --shadow: 0 10px 30px rgba(19, 31, 68, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #10182b;
      color: #fff;
      padding: 24px 18px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .brand {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.2px;
      margin-bottom: 6px;
    }

    .subbrand {
      color: #a8b3cf;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .nav {
      display: grid;
      gap: 8px;
    }

    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: #d5ddf3;
      text-align: left;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .nav button.active,
    .nav button:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .sidebar-note {
      margin-top: 22px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.08);
      font-size: 12px;
      color: #c8d2eb;
      line-height: 1.45;
    }

    .main {
      padding: 24px;
    }

    .topbar {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .headline h1 {
      margin: 0;
      font-size: 28px;
    }

    .headline p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .pill-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .view { display: none; }
    .view.active { display: block; }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .card .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
    }

    select, input {
      width: 100%;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      font-size: 14px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 12px 10px;
      border-bottom: 1px solid var(--line);
      vertical-align: top;
    }
