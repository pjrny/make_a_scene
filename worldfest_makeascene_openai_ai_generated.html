<meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Make a Scene</title>
  <style>
    :root{
      --bg:#faf7f5;
      --card:#ffffff;
      --text:#221b1b;
      --muted:#6d5c5c;
      --brand:#8d0f1a;
      --brand2:#b11a27;
      --line:#eadfdf;
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1120px;margin:0 auto;padding:24px 16px 48px}
    h1{margin:0 0 8px;font-size:36px}
    .sub{color:var(--muted);margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:20px}
    @media (max-width:920px){.grid{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:0 10px 28px rgba(0,0,0,.04)}
    .scenes{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    @media (max-width:640px){.scenes{grid-template-columns:1fr}}
    .scene{border:2px solid transparent;border-radius:16px;overflow:hidden;cursor:pointer;background:#fff;transition:.15s ease}
    .scene.active{border-color:var(--brand);box-shadow:0 0 0 3px rgba(141,15,26,.12)}
    .scene img{display:block;width:100%;height:180px;object-fit:cover;background:#eee}
    .scene .meta{padding:10px 12px 12px}
    .scene .meta strong{display:block}
    label{display:block;font-size:14px;font-weight:700;margin:14px 0 8px}
    select,input[type="file"]{width:100%;border:1px solid var(--line);border-radius:12px;padding:12px 14px;font:inherit;background:#fff}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .btn{border:none;border-radius:999px;padding:12px 18px;font:inherit;font-weight:700;cursor:pointer}
    .btn-primary{background:linear-gradient(180deg,var(--brand2),var(--brand));color:#fff}
    .btn-secondary{background:#f2eded;color:#3f3131}
    .out{min-height:360px;border:1px dashed var(--line);border-radius:16px;display:flex;align-items:center;justify-content:center;background:#fff;overflow:hidden}
    .out img{width:100%;height:auto;display:block}
    .status{font-size:14px;color:var(--muted);margin-top:10px;white-space:pre-wrap}
    .note{padding:12px;border-radius:12px;background:#f8f2f2;border:1px solid var(--line);color:#5b4444;font-size:14px}
    .terms{display:flex;gap:10px;align-items:flex-start;margin-top:14px;font-size:14px}
  </style>


  <div class="wrap">
    <h1>Make a Scene</h1>
    <div class="sub">Upload a photo, choose a movie scene, and insert yourself into the shot.</div>

    <div class="grid">
      <div class="card">
        <h2 style="margin-top:0">1. Pick a scene</h2>
        <div class="scenes" id="scenes"></div>

        <label for="photo">2. Upload your photo</label>
        <input id="photo" type="file" accept="image/*">

        <label for="provider">3. Choose AI generator</label>
        <select id="provider">
          <option value="auto">Auto (recommended)</option>
          <option value="gemini">Gemini</option>
          <option value="vertex">Vertex</option>
          <option value="xai">xAI</option>
          <option value="replicate">Replicate</option>
        </select>

        <label class="terms">
          <input id="agreeTerms" type="checkbox">
          <span>I agree to the terms of use and confirm I have permission to upload and transform this photo.</span>
        </label>

        <div class="row" style="margin-top:16px">
          <button class="btn btn-primary" id="generateBtn">Generate Poster</button>
          <button class="btn btn-secondary" id="accurateBtn" type="button">Try More Accurate Replacement</button>
          <button class="btn btn-secondary" id="resetBtn" type="button">Reset</button>
        </div>

        <div class="status" id="status"></div>
      </div>

      <div class="card">
        <h2 style="margin-top:0">Result</h2>
        <div class="out" id="output">
          <div style="padding:20px;text-align:center;color:#7b6868">Your generated scene will appear here.</div>
        </div>
        <div class="row" style="margin-top:12px">
          <button class="btn btn-secondary" id="downloadBtn" type="button" disabled="">Download</button>
        </div>
        <div class="note" style="margin-top:16px">
          Best results: one face, clear lighting, minimal obstruction, medium close-up or portrait photo.
        </div>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://worldfest-make-a-scene.message-0ad.workers.dev";

    const SCENES = [
      { id: "scene", title: "Make a Scene", desc: "Dramatic deli-table energy", img: "https://flix.worldfest.org/web/image/1320-d9458722/MAS1.png" },
      { id: "entrance", title: "Make an Entrance", desc: "Confident carnival reveal", img: "https://flix.worldfest.org/web/image/1319-3f8820d2/MAS2.png" },
      { id: "exit", title: "Make an Exit", desc: "Black-and-white airport goodbye", img: "https://flix.worldfest.org/web/image/1318-4fe37bdf/MAS3.png" },
      { id: "loud", title: "Make It Loud", desc: "Explosive newsroom confrontation", img: "https://flix.worldfest.org/web/image/1317-02df90ca/MAS4.png" },
      { id: "personal", title: "Make It Personal", desc: "Sword-duel intensity", img: "https://flix.worldfest.org/web/image/1316-265611e6/MAS5.png" }
    ];

    let selectedScene = SCENES[0].id;
    let latestBlob = null;

    const scenesEl = document.getElementById("scenes");
    const photoEl = document.getElementById("photo");
    const providerEl = document.getElementById("provider");
    const agreeTermsEl = document.getElementById("agreeTerms");
    const generateBtn = document.getElementById("generateBtn");
    const accurateBtn = document.getElementById("accurateBtn");
    const resetBtn = document.getElementById("resetBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const outputEl = document.getElementById("output");

    function renderScenes() {
      scenesEl.innerHTML = "";
      SCENES.forEach(scene => {
        const el = document.createElement("button");
        el.type = "button";
        el.className = "scene" + (scene.id === selectedScene ? " active" : "");
        el.innerHTML = `
          <img src="${scene.img}" alt="${scene.title}">
          <div class="meta">
            <strong>${scene.title}</strong>
            <span>${scene.desc}</span>
          </div>
        `;
        el.addEventListener("click", () => {
          selectedScene = scene.id;
          renderScenes();
        });
        scenesEl.appendChild(el);
      });
    }

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function resetUI() {
      photoEl.value = "";
      providerEl.value = "auto";
      agreeTermsEl.checked = false;
      latestBlob = null;
      downloadBtn.disabled = true;
      outputEl.innerHTML = `<div style="padding:20px;text-align:center;color:#7b6868">Your generated scene will appear here.</div>`;
      setStatus("");
    }

    async function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function getPayload(providerMode, accuracyMode, imageDataUrl) {
      return {
        sceneId: selectedScene,
        providerMode,
        accuracyMode,
        imageDataUrl
      };
    }

    async function runGeneration(accuracyMode) {
      const file = photoEl.files[0];
      if (!file) {
        setStatus("Please upload a photo first.");
        return;
      }
      if (!agreeTermsEl.checked) {
        setStatus("Please agree to the terms before generating.");
        return;
      }

      const providerMode = providerEl.value || "auto";
      generateBtn.disabled = true;
      accurateBtn.disabled = true;
      downloadBtn.disabled = true;
      setStatus("Generating...");
      outputEl.innerHTML = `<div style="padding:20px;text-align:center;color:#7b6868">Generating your image...</div>`;

      try {
        const imageDataUrl = await fileToDataUrl(file);
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(getPayload(providerMode, accuracyMode, imageDataUrl))
        });

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error("Invalid JSON response: " + text);
        }

        if (!res.ok || !data.ok || !data.imageBase64) {
          const debug = (data.debugLogs || []).join("\n");
          setStatus("Generation failed.\n\n" + (debug || data.error || "Unknown error"));
          outputEl.innerHTML = `<div style="padding:20px;text-align:center;color:#7b6868">No image returned.</div>`;
          return;
        }

        const mime = data.mimeType || "image/png";
        const imgSrc = `data:${mime};base64,${data.imageBase64}`;
        outputEl.innerHTML = `<img src="${imgSrc}" alt="Generated scene">`;

        const blob = await (await fetch(imgSrc)).blob();
        latestBlob = blob;
        downloadBtn.disabled = false;

        const debugText = data.debugLogs ? "\n\n" + data.debugLogs.join("\n") : "";
        setStatus(`Success with ${data.provider} (${data.model}).${debugText}`);
      } catch (err) {
        setStatus("Unexpected error: " + (err.message || String(err)));
        outputEl.innerHTML = `<div style="padding:20px;text-align:center;color:#7b6868">Unexpected error.</div>`;
      } finally {
        generateBtn.disabled = false;
        accurateBtn.disabled = false;
      }
    }

    function downloadImage() {
      if (!latestBlob) return;
      const url = URL.createObjectURL(latestBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `make-a-scene-${selectedScene}.png`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    generateBtn.addEventListener("click", () => runGeneration("fast"));
    accurateBtn.addEventListener("click", () => runGeneration("accurate"));
    resetBtn.addEventListener("click", resetUI);
    downloadBtn.addEventListener("click", downloadImage);

    renderScenes();
  </script>
